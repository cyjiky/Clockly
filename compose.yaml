services:
  backend:
    container_name: clockly-backend
    image: clockly-backend
    build: 
      context: ./backend
      dockerfile: Containerfile
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
    command: 
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
